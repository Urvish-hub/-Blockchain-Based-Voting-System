{% extends "base.html" %}

{% block title %}Add Candidate - Online Voting System{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header">
            <h2>Add New Candidate</h2>
        </div>
        <form method="POST" action="{{ url_for('admin.add_candidate') }}">
            <div class="form-group">
                <label for="name">Candidate Name *</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="party">Party/Organization *</label>
                <input type="text" id="party" name="party" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="position">Position *</label>
                <input type="text" id="position" name="position" class="form-control" 
                       placeholder="e.g., President, Vice President, Secretary" required>
            </div>
            <div class="form-group">
                <label for="bio">Biography (Optional)</label>
                <textarea id="bio" name="bio" class="form-control" rows="4"></textarea>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">Add Candidate</button>
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
