{% extends "base.html" %}

{% block title %}Admin Login - Online Voting System{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header">
            <h2>Admin Login</h2>
        </div>
        <form method="POST" action="{{ url_for('admin.admin_login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login as Admin</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem;">
            <p><a href="{{ url_for('user.index') }}">← Back to Home</a></p>
        </div>
    </div>
</div>
{% endblock %}
