{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="card" style="text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 4rem; color: var(--primary-color); margin-bottom: 1rem;">404</h1>
    <h2 style="margin-bottom: 1rem;">Page Not Found</h2>
    <p style="color: var(--text-light); margin-bottom: 2rem;">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('user.index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
